name: Security Review

permissions:
  pull-requests: write  # Needed for leaving PR comments
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2
      - uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda  # pinned to main tip as of 2026-05-18 for supply chain hygiene; to re-update: gh api repos/anthropics/claude-code-security-review/commits/main --jq .sha
        with:
          comment-pr: true
          upload-results: true
          claudecode-timeout: '20'
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
